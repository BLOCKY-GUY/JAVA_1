<!DOCTYPE html>
<html lang="en">
<body>
    <h1> operators in JavaScript</h1>
    <p id="operators"></p>

    <script>
        // +, -, /, * are operators

        var a = 18;
        var b = 3;
        var c = 6;
        var d = (a / b) + c

        document.getElementById("operators").innerHTML = d;
    </script>
</body>
</html>
